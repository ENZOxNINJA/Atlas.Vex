# CORS configuration
[[cors]]
allowed_origins = ["https://themarvel.space", "https://www.themarvel.space", "http://localhost:3000"]
allowed_methods = ["GET", "POST", "OPTIONS"]
allowed_headers = ["Content-Type", "Authorization"]
allow_credentials = true